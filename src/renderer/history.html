<!DOCTYPE html>
<html lang="en" style="background:#08101d">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;">
<title>Sermon History — AnchorCast</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=DM+Sans:wght@300;400;500;600&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=DM+Sans:wght@300;400;500;600&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet"></noscript>
<style>
:root{--void:#08080f;--deep:#0c0c17;--panel:#10101c;--card:#16162a;--border:#252540;--border-lit:#343458;--gold:#c9a84c;--gold-b:#e8c870;--gold-d:#6a5220;--live:#e74c3c;--text:#ddddf0;--sub:#8888aa;--dim:#4a4a68;--r:6px;}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--void);color:var(--text);display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border-lit);border-radius:4px}

.hdr{height:46px;background:var(--deep);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
.hdr-title{font-family:'Cinzel',serif;font-size:14px;font-weight:600;color:var(--gold-b);letter-spacing:1.5px;flex:1}
.hbtn{padding:6px 14px;border-radius:var(--r);font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.4px;text-transform:uppercase;font-family:inherit;border:1px solid;transition:all .15s}
.hbtn-ghost{background:transparent;border-color:var(--border-lit);color:var(--sub)}
.hbtn-ghost:hover{color:var(--text)}

.layout{display:grid;grid-template-columns:310px 1fr;flex:1;min-height:0;gap:1px;background:var(--border)}

/* Sidebar */
.sidebar{background:var(--panel);display:flex;flex-direction:column;overflow:hidden}
.sb-hdr{padding:9px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sb-title{font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.8px}
.sb-count{font-size:10px;color:var(--dim);background:var(--card);padding:2px 7px;border-radius:10px;border:1px solid var(--border)}
.search-bar{padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.search-input{width:100%;background:var(--card);border:1px solid var(--border-lit);border-radius:var(--r);color:var(--text);font-family:inherit;font-size:12px;padding:7px 10px;outline:none;transition:border .15s}
.search-input:focus{border-color:var(--gold-d)}
.search-input::placeholder{color:var(--dim)}
.session-list{flex:1;overflow-y:auto}
.s-item{padding:11px 13px;border-bottom:1px solid rgba(37,37,64,.5);cursor:pointer;transition:background .12s}
.s-item:hover{background:var(--card)}
.s-item.active{background:rgba(201,168,76,.07);border-left:2px solid var(--gold)}
.s-date{font-size:9.5px;color:var(--dim);margin-bottom:2px}
.s-title{font-size:12.5px;font-weight:600;color:var(--text);margin-bottom:2px}
.s-meta{font-size:10.5px;color:var(--sub)}
.s-tags{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.tag{font-size:9px;padding:2px 7px;border-radius:10px;background:rgba(201,168,76,.12);color:var(--gold);font-weight:600;border:1px solid var(--gold-d)}
.empty-list{padding:28px 14px;text-align:center;color:var(--dim);font-size:12px;line-height:2}

/* Detail */
.detail{background:var(--panel);display:flex;flex-direction:column;overflow:hidden}
.detail-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--dim);gap:10px}
.detail-icon{font-size:42px;opacity:.2}

/* Detail header */
.d-hdr{padding:13px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.d-title{font-family:'Cinzel',serif;font-size:15px;font-weight:600;color:var(--text);margin-bottom:3px}
.d-meta{font-size:11px;color:var(--sub)}
.d-body{flex:1;overflow-y:auto;padding:22px}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.stat-n{font-family:'Cinzel',serif;font-size:22px;font-weight:600;color:var(--gold-b)}
.stat-l{font-size:9.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-top:3px}

/* Transcript */
.sec-title{font-family:'Cinzel',serif;font-size:11px;font-weight:600;color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.t-line{padding:5px 0 5px 10px;font-size:12.5px;line-height:1.75;color:var(--sub);border-left:2px solid transparent;margin-bottom:1px}
.t-line.hit{color:var(--gold-b);border-left-color:var(--gold-b)}
.t-time{font-size:9.5px;color:var(--dim);margin-right:7px;font-family:monospace}

/* Verses section */
.verses-sec{margin-top:22px;padding-top:18px;border-top:1px solid var(--border)}
.v-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:9px}
.v-ref{font-family:'Cinzel',serif;font-size:11.5px;color:var(--gold);margin-bottom:5px;font-weight:600}
.v-text{font-family:'Crimson Pro',serif;font-size:13.5px;color:var(--sub);line-height:1.65}

/* Action bar */
.d-actions{padding:11px 18px;border-top:1px solid var(--border);display:flex;gap:7px;flex-shrink:0}
.act-btn{padding:7px 14px;border-radius:var(--r);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;border:1px solid;font-family:inherit;letter-spacing:.4px;text-transform:uppercase}
.act-gold{background:var(--gold-d);border-color:var(--gold);color:var(--gold-b)}
.act-ghost{background:transparent;border-color:var(--border-lit);color:var(--sub)}
.act-ghost:hover{color:var(--text)}
.act-red{background:rgba(192,57,43,.08);border-color:rgba(192,57,43,.4);color:var(--live)}
.act-red:hover{background:rgba(192,57,43,.18)}

.toast{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border-lit);border-radius:8px;padding:7px 18px;font-size:12px;color:var(--gold-b);z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body style="background:#08101d" style="background:#08101d">
<div class="hdr">
  <div class="hdr-title">📝 Sermon History</div>
  <button class="hbtn hbtn-ghost" onclick="window.close()">✕ Close</button>
</div>
<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sb-hdr">
      <div class="sb-title">Sessions</div>
      <div class="sb-count" id="sbCount">0</div>
    </div>
    <div class="search-bar">
      <input class="search-input" id="searchIn" placeholder="Search sessions…" oninput="filter(this.value)">
    </div>
    <div class="session-list" id="sList"></div>
  </div>
  <!-- Detail -->
  <div class="detail" id="detailPane">
    <div class="detail-empty">
      <div class="detail-icon">📜</div>
      <div style="font-size:13px">Select a session to review its transcript</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
let all=[], filtered=[], activeId=null;

async function init(){
  if(window.electronAPI){
    all=await window.electronAPI.getTranscripts()||[];
  } else {
    // Demo data for browser testing
    all=[
      {id:'1',savedAt:new Date(Date.now()-86400000).toISOString(),title:'Sunday Morning Service',duration:3240,lineCount:52,verseCount:8,
       text:'Good morning church. We open today in John chapter three verse sixteen.\nFor God so loved the world that he gave his only begotten Son.\nThis verse is the foundation of our faith.\nTurn with me to Romans chapter eight verse twenty eight.\nAnd we know that all things work together for good to those who love God.\nThe prophet Isaiah said in chapter forty verse thirty one:\nBut those who wait on the Lord shall renew their strength.\nIn Jeremiah twenty nine eleven God promises a future and a hope.',
       detectedVerses:['John 3:16','Romans 8:28','Isaiah 40:31','Jeremiah 29:11']},
      {id:'2',savedAt:new Date(Date.now()-604800000).toISOString(),title:'Wednesday Bible Study',duration:2700,lineCount:38,verseCount:5,
       text:'Tonight we study Philippians four thirteen.\nI can do all things through Christ who strengthens me.\nPaul wrote this from prison yet he spoke of contentment.\nWe also look at Hebrews eleven one.\nNow faith is the substance of things hoped for.',
       detectedVerses:['Philippians 4:13','Hebrews 11:1']},
    ];
  }
  filtered=[...all];
  renderList();
  if(all.length) select(all[0].id);
}

function renderList(){
  const el=document.getElementById('sList');
  document.getElementById('sbCount').textContent=filtered.length;
  if(!filtered.length){
    el.innerHTML='<div class="empty-list">📭<br>No sessions found.<br>Start transcribing to build history.</div>';
    return;
  }
  el.innerHTML='';
  filtered.forEach(s=>{
    const d=new Date(s.savedAt);
    const dateStr=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    const timeStr=d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    const dur=fmtDur(s.duration||0);
    const div=document.createElement('div');
    div.className='s-item'+(s.id===activeId?' active':'');
    div.innerHTML=`
      <div class="s-date">${dateStr} at ${timeStr}</div>
      <div class="s-title">${s.title||'Sermon Session'}</div>
      <div class="s-meta">${dur} · ${s.lineCount||0} lines · ${s.verseCount||0} verses</div>
      ${(s.detectedVerses||[]).length?`<div class="s-tags">${(s.detectedVerses||[]).slice(0,4).map(v=>`<span class="tag">${v}</span>`).join('')}</div>`:''}
    `;
    div.onclick=()=>select(s.id);
    el.appendChild(div);
  });
}

function filter(q){
  const qlo=q.toLowerCase();
  filtered=all.filter(s=>
    (s.title||'').toLowerCase().includes(qlo)||
    (s.text||'').toLowerCase().includes(qlo)||
    (s.detectedVerses||[]).some(v=>v.toLowerCase().includes(qlo))
  );
  renderList();
}

function select(id){
  activeId=id;
  renderList();
  const s=all.find(x=>x.id===id);
  if(!s) return;
  renderDetail(s);
}

function renderDetail(s){
  const pane=document.getElementById('detailPane');
  const date=new Date(s.savedAt).toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const time=new Date(s.savedAt).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  const lines=(s.text||'').split('\n').filter(Boolean);
  const refs=s.detectedVerses||[];
  const words=(s.text||'').split(/\s+/).filter(Boolean).length;

  pane.innerHTML=`
    <div class="d-hdr">
      <div class="d-title">${s.title||'Sermon Session'}</div>
      <div class="d-meta">${date} at ${time}</div>
    </div>
    <div class="d-body">
      <div class="stats">
        <div class="stat"><div class="stat-n">${fmtDur(s.duration||0)}</div><div class="stat-l">Duration</div></div>
        <div class="stat"><div class="stat-n">${lines.length}</div><div class="stat-l">Lines</div></div>
        <div class="stat"><div class="stat-n">${refs.length}</div><div class="stat-l">Verses</div></div>
        <div class="stat"><div class="stat-n">${words.toLocaleString()}</div><div class="stat-l">Words</div></div>
      </div>
      <div class="sec-title">Transcript</div>
      ${lines.map((line,i)=>{
        const isHit=refs.some(r=>line.toLowerCase().includes((r.split(' ')[0]||'').toLowerCase())&&r.split(' ')[0].length>2);
        const mm=String(Math.floor(i*4/60)).padStart(2,'0');
        const ss=String((i*4)%60).padStart(2,'0');
        return`<div class="t-line${isHit?' hit':''}"><span class="t-time">${mm}:${ss}</span>${esc(line)}</div>`;
      }).join('')}
      ${refs.length?`
        <div class="verses-sec">
          <div class="sec-title">Detected Verses</div>
          ${refs.map(r=>`<div class="v-card"><div class="v-ref">${r}</div><div class="v-text">Referenced during this service</div></div>`).join('')}
        </div>`:''
      }
    </div>
    <div class="d-actions">
      <button class="act-btn act-gold" onclick="exportS('${s.id}')">↓ Export</button>
      <button class="act-btn act-ghost" onclick="copyS('${s.id}')">⎘ Copy</button>
      <div style="flex:1"></div>
      <button class="act-btn act-red" onclick="delS('${s.id}')">🗑 Delete</button>
    </div>
  `;
}

async function exportS(id){
  const s=all.find(x=>x.id===id); if(!s||!window.electronAPI) return;
  const content=`SERMON TRANSCRIPT\n${'='.repeat(40)}\n${s.title||'Session'}\n${new Date(s.savedAt).toLocaleString()}\nDuration: ${fmtDur(s.duration||0)}\n\n${'='.repeat(40)}\nTRANSCRIPT\n${'='.repeat(40)}\n\n${s.text||''}\n\n${'='.repeat(40)}\nDETECTED VERSES\n${'='.repeat(40)}\n${(s.detectedVerses||[]).join('\n')}`;
  await window.electronAPI.exportFile({content,defaultName:`sermon-${new Date(s.savedAt).toISOString().slice(0,10)}.txt`,filters:[{name:'Text',extensions:['txt']},{name:'Markdown',extensions:['md']}]});
  toast('↓ Exported');
}

async function copyS(id){
  const s=all.find(x=>x.id===id); if(!s) return;
  await navigator.clipboard.writeText(s.text||'');
  toast('⎘ Copied to clipboard');
}

async function delS(id){
  if(!confirm('Delete this session permanently?')) return;
  if(window.electronAPI) await window.electronAPI.deleteTranscript(id);
  all=all.filter(x=>x.id!==id); filtered=filtered.filter(x=>x.id!==id);
  activeId=null; renderList();
  document.getElementById('detailPane').innerHTML='<div class="detail-empty"><div class="detail-icon">📜</div><div style="font-size:13px">Select a session to review its transcript</div></div>';
  toast('🗑 Session deleted');
}

function fmtDur(s){ if(!s)return'—'; const m=Math.floor(s/60),sec=s%60; return m?`${m}m ${sec}s`:`${sec}s`; }
function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let tt;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(tt); tt=setTimeout(()=>el.classList.remove('show'),2400);
}

init();
</script>
</body></html>
