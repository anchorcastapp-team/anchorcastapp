<!DOCTYPE html>
<html lang="en" style="background:#000">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com;
             connect-src 'self';
             script-src 'self' 'unsafe-inline';
             style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
             img-src 'self' file: data: blob: media: http: https:;
             media-src 'self' file: blob: media: http: https:;">
  <title>AnchorCast — Projection</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400;1,700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400;1,700&display=swap" rel="stylesheet"></noscript>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100vw; height: 100vh;
      background: #000;
      overflow: hidden;
      color: #fff;
      position: relative;
      cursor: none;
    }
    /* Background layers */
    .bg {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 35% 45%, #100828 0%, #000418 55%, #000 100%);
      transition: background 0.8s ease;
    }
    .bg::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(circle at 15% 75%, rgba(201,168,76,0.07) 0%, transparent 50%),
        radial-gradient(circle at 85% 20%, rgba(201,168,76,0.04) 0%, transparent 50%);
    }
    /* Subtle grain overlay */
    .bg.theme-video::before, .bg.theme-video::after { display:none; }
    .bg::after {
      content: '';
      position: absolute; inset: 0;
      opacity: 0.015;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* Main content area */
    .stage {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      width: 100%; height: 100%;
      padding: 80px 140px;
      text-align: center;
      opacity: 1;
      transition: opacity 0.45s ease, transform 0.45s ease;
    }
    .stage.out { opacity: 0; transform: translateY(14px); }

    .ref-label {
      font-family: 'Cinzel', serif;
      font-size: clamp(16px, 2vw, 28px);
      font-weight: 500;
      color: #c9a84c;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: clamp(20px, 3vh, 50px);
      opacity: 0.9;
    }

    .verse-num {
      font-size: 0.55em;
      color: inherit;
      vertical-align: super;
      margin-right: 4px;
    }

    .verse-text {
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: clamp(32px, 4.5vw, 72px);
      line-height: 1.6;
      color: #ede6d8;
      font-weight: 400;
      text-shadow:
        0 2px 40px rgba(0,0,0,0.95),
        0 0 80px rgba(0,0,0,0.6);
      max-width: 1200px;
    }

    .verse-text em {
      font-style: italic;
      color: #e8c870;
    }

    .trans-label {
      margin-top: clamp(18px, 2.5vh, 40px);
      font-family: 'Cinzel', serif;
      font-size: clamp(12px, 1.2vw, 18px);
      color: #6a5220;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    .part-badge {
      position: absolute;
      top: 18px;
      right: 22px;
      z-index: 6;
      display: none;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(201,168,76,.38);
      background: rgba(0,0,0,.5);
      color: #f0d993;
      font-family: 'Cinzel', serif;
      font-size: clamp(10px, 1vw, 14px);
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    /* Empty / cleared state */
    .empty-state {
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 100%;
      position: relative; z-index: 2;
    }
    .cross-mark {
      font-family: 'Cinzel', serif;
      font-size: clamp(60px, 10vw, 140px);
      color: rgba(255,255,255,0.04);
      user-select: none;
    }

    /* ── Media layer ── */
    .media-layer {
      position: absolute; inset: 0; z-index: 1;
      display: none; align-items: center; justify-content: center;
      background: #000;
    }
    .media-layer.active { display: flex; }
    .media-layer img {
      width: 100%; height: 100%; object-fit: cover;
      transition: opacity 0.6s ease;
    }
    .media-layer video {
      width: 100%; height: 100%; object-fit: cover;
    }
    /* Fade transition overlay */
    .fade-overlay {
      position: absolute; inset: 0; z-index: 5;
      background: #000; opacity: 0; pointer-events: none;
      transition: opacity 0.5s ease;
    }
    .fade-overlay.fading { opacity: 1; }

    /* Caption overlay */
    .caption-layer {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 51;
      padding: clamp(20px,4vh,60px) clamp(30px,6vw,100px);
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
      display: none;
    }
    .caption-layer.active { display: block; }
    .caption-text {
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: clamp(20px, 2.5vw, 40px);
      color: #fff;
      text-shadow: 0 2px 20px rgba(0,0,0,0.9);
      line-height: 1.4;
      text-align: center;
    }

    /* Clock/Date overlay */
    .clock-layer {
      position: absolute;
      z-index: 55;  /* above timer-layer (z-index 50) */
      display: none;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
      padding: 12px 20px;
    }
    .clock-layer.active { display: flex; }
    .clock-layer.pos-top-left  { top: 24px; left: 28px; align-items: flex-start; }
    .clock-layer.pos-top-right { top: 24px; right: 28px; align-items: flex-end; }
    .clock-layer.pos-bot-left  { bottom: 24px; left: 28px; align-items: flex-start; }
    .clock-layer.pos-bot-right { bottom: 24px; right: 28px; align-items: flex-end; }
    .clock-layer.pos-center    { top: 50%; left: 50%; transform: translate(-50%,-50%); align-items: center; }
    .clock-time {
      font-family: 'Cinzel', serif;
      font-size: clamp(28px, 4vw, 72px);
      font-weight: 700;
      color: #ffffff;
      line-height: 1;
      text-shadow: 0 2px 12px rgba(0,0,0,.7);
    }
    .clock-date {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(11px, 1.2vw, 20px);
      font-weight: 500;
      color: rgba(255,255,255,.75);
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-top: 4px;
      text-shadow: 0 1px 8px rgba(0,0,0,.6);
    }

    /* Timer/countdown overlay */
    .timer-layer {
      position: absolute; z-index: 50; /* Always above all content layers */
      display: none; flex-direction: column;
    }
    .timer-layer.active { display: flex; }
    .timer-layer.pos-center {
      inset: 0; align-items: center; justify-content: center;
    }
    .timer-layer.pos-top {
      top: 30px; left: 0; right: 0; align-items: center;
    }
    .timer-layer.pos-edge {
      top: 30px; right: 40px; align-items: flex-end;
    }
    .timer-display {
      font-family: 'Cinzel', serif;
      font-size: clamp(48px, 8vw, 120px);
      font-weight: 700;
      color: #fff;
      text-shadow: 0 0 6px rgba(0,0,0,1), 0 0 12px rgba(0,0,0,0.9), 0 2px 20px rgba(0,0,0,0.8),
                   2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
      letter-spacing: 0.05em;
      line-height: 1;
      -webkit-text-stroke: 1.5px rgba(0,0,0,0.6);
    }
    .timer-layer.pos-edge .timer-display {
      font-size: clamp(28px, 4vw, 64px);
      -webkit-text-stroke: 1px rgba(0,0,0,0.6);
    }
    .timer-label {
      font-family: 'Cinzel', serif;
      font-size: clamp(12px, 1.6vw, 22px);
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 8px;
      text-align: center;
      text-shadow: 0 0 4px rgba(0,0,0,1), 0 0 10px rgba(0,0,0,0.8),
                   1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
      -webkit-text-stroke: 0.5px rgba(0,0,0,0.5);
    }
    .timer-layer.pos-edge .timer-label {
      font-size: clamp(9px, 1vw, 14px);
      margin-top: 4px;
      text-align: right;
    }
    .timer-display.warning { color: #e74c3c; animation: blink var(--blink-speed, 1s) infinite; }
    .timer-display.overtime { color: #e74c3c; animation: blink var(--blink-speed, 1s) infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }
    .copyright-line {
      position: absolute;
      bottom: 14px;
      right: 20px;
      font-size: clamp(11px, 1.1vw, 16px);
      color: rgba(255,255,255,0.55);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      z-index: 10;
      text-align: right;
      max-width: 60%;
      line-height: 1.4;
      pointer-events: none;
    }

    .nursery-alert-layer {
      position: absolute; z-index: 8; display: none;
      left: 0; right: 0;
      padding: 12px 24px;
      overflow: hidden;
      animation: alertFadeIn 0.4s ease;
    }
    .nursery-alert-layer.active { display: flex; align-items: center; }
    .nursery-alert-layer.pos-bottom-left  { bottom: 0; }
    .nursery-alert-layer.pos-bottom-right { bottom: 0; }
    .nursery-alert-layer.pos-top-left     { top: 0; }
    .nursery-alert-layer.pos-top-right    { top: 0; }
    .nursery-alert-text {
      font-weight: 700; line-height: 1.3; white-space: nowrap;
      width: 100%; text-align: center;
    }

    .message-alert-layer {
      position: absolute; left: 0; right: 0; z-index: 9;
      display: none; overflow: hidden; height: auto;
      padding: 8px 0;
    }
    .message-alert-layer.active { display: block; }
    .message-alert-layer.pos-top    { top: 0; }
    .message-alert-layer.pos-bottom { bottom: 0; }
    .message-alert-text {
      display: inline-block; white-space: nowrap;
      font-weight: 700; line-height: 1.3;
      animation: alertScroll linear infinite;
      padding-left: 100%;
    }
    @keyframes alertFadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    @keyframes alertScroll { from { transform: translateX(0); } to { transform: translateX(-100%); } }

    /* Logo overlay layer */
    .logo-overlay-layer {
      position: absolute; z-index: 52;
      display: none; pointer-events: none;
    }
    .logo-overlay-layer.active { display: block; }
    .logo-overlay-layer img,
    .logo-overlay-layer video {
      width: 100%; height: 100%;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }
    .logo-overlay-layer .logo-resize-handle {
      display: none;
    }

    /* Theme variants */
    body[data-theme="dawn"] .bg {
      background: radial-gradient(ellipse at 40% 50%, #1a0c08 0%, #080010 55%, #000 100%);
    }
    body[data-theme="deep"] .bg {
      background: radial-gradient(ellipse at 50% 50%, #001028 0%, #000408 55%, #000 100%);
    }
  </style>
</head>
<body style="background:#000">
<div class="bg"></div>

<!-- Media layer (images + video) -->
<div class="media-layer" id="mediaLayer">
  <img id="mediaImg" src="" style="display:none">
  <video id="mediaVideo" playsinline style="display:none"></video>
</div>

<!-- Caption overlay -->
<div class="caption-layer" id="captionLayer">
  <div class="caption-text" id="captionText"></div>
</div>

<!-- Timer/countdown overlay -->
<div class="timer-layer pos-top" id="timerLayer">
  <div class="timer-display" id="timerDisplay">00:00</div>
  <div class="timer-label" id="timerLabel">COUNTDOWN</div>
</div>

<!-- Clock / Date overlay -->
<div class="clock-layer pos-top-left" id="clockLayer">
  <div class="clock-time" id="clockTime">12:00 PM</div>
  <div class="clock-date" id="clockDate">Sunday, January 1</div>
</div>

<!-- Nursery alert overlay -->
<div class="nursery-alert-layer pos-bottom-left" id="nurseryAlertLayer">
  <div class="nursery-alert-text" id="nurseryAlertText"></div>
</div>

<!-- Message alert overlay -->
<div class="message-alert-layer pos-top" id="messageAlertLayer">
  <div class="message-alert-text" id="messageAlertText"></div>
</div>

<!-- Logo overlay layer (draggable/resizable) -->
<div class="logo-overlay-layer" id="logoOverlayLayer">
  <div class="logo-resize-handle" id="logoResizeHandle"></div>
</div>

<!-- Fade transition overlay -->
<div class="fade-overlay" id="fadeOverlay"></div>

<div class="part-badge" id="partBadge"></div>

<!-- Empty default state -->
<div class="empty-state" id="emptyState">
  <div class="cross-mark">✝</div>
</div>

<!-- Verse display -->
<div class="stage" id="stage" style="display:none">
  <div class="ref-label" id="refLabel"></div>
  <div class="verse-text" id="verseText"></div>
  <div class="trans-label" id="transLabel"></div>
  <div class="copyright-line" id="copyrightLine" style="display:none"></div>
</div>

<script src="js/electron-shim.js"></script>
<script>
  // ── All DOM refs — declared first so all functions can access them ─────────
  const stage       = document.getElementById('stage');
  const empty       = document.getElementById('emptyState');
  const refLabel    = document.getElementById('refLabel');
  const verseEl     = document.getElementById('verseText');
  const transEl      = document.getElementById('transLabel');
  const copyrightEl  = document.getElementById('copyrightLine');
  const mediaLayer  = document.getElementById('mediaLayer');
  const mediaImg    = document.getElementById('mediaImg');
  const mediaVideo  = document.getElementById('mediaVideo');
  const captionLayer= document.getElementById('captionLayer');
  const captionText = document.getElementById('captionText');
  const timerLayer  = document.getElementById('timerLayer');
  const timerDisp   = document.getElementById('timerDisplay');
  const timerLabel  = document.getElementById('timerLabel');
  const fadeOverlay = document.getElementById('fadeOverlay');
  const partBadge   = document.getElementById('partBadge');
  const nurseryAlertLayer = document.getElementById('nurseryAlertLayer');
  const nurseryAlertText  = document.getElementById('nurseryAlertText');
  const messageAlertLayer = document.getElementById('messageAlertLayer');
  const messageAlertText  = document.getElementById('messageAlertText');
  const logoOverlayLayer  = document.getElementById('logoOverlayLayer');
  const logoResizeHandle  = document.getElementById('logoResizeHandle');


  function clearProjectionMediaState() {
    currentOverlayPreserveMedia = false;
    if (partBadge) { partBadge.style.display = 'none'; partBadge.textContent = ''; }
    mediaVideo.pause?.();
    mediaVideo.src = '';
    mediaVideo.style.display = 'none';
    mediaImg.src = '';
    mediaImg.style.display = 'none';
    const oldAudio = mediaLayer.querySelector('audio');
    if (oldAudio) { oldAudio.pause?.(); oldAudio.src = ''; oldAudio.remove(); }
    const oldOverlay = mediaLayer.querySelector('.audio-overlay');
    if (oldOverlay) oldOverlay.remove();
    mediaLayer.querySelectorAll('.created-slide-content').forEach(e => e.remove());
    document.querySelectorAll('.theme-box-el').forEach(e => e.remove());
    const bgVid = document.getElementById('themeBgVideo');
    if (bgVid) { bgVid.pause?.(); bgVid.src = ''; bgVid.dataset.mediaUrl = ''; bgVid.style.display = 'none'; }
    const bgOv = document.getElementById('themeBgOverlay');
    if (bgOv) bgOv.style.background = 'transparent';
    mediaLayer.style.background = '#000';
    mediaLayer.style.backgroundImage = 'none';
    mediaLayer.classList.remove('active');
    stage.style.display = 'none';
    stage.classList.remove('out');
  }



  function clearProjectionTextState() {
    currentOverlayPreserveMedia = false;
    if (partBadge) { partBadge.style.display = 'none'; partBadge.textContent = ''; }
    mediaVideo.pause?.();
    mediaVideo.src = '';
    mediaVideo.style.display = 'none';
    mediaImg.src = '';
    mediaImg.style.display = 'none';
    const oldAudio = mediaLayer.querySelector('audio');
    if (oldAudio) { oldAudio.pause?.(); oldAudio.src = ''; oldAudio.remove(); }
    const oldOverlay = mediaLayer.querySelector('.audio-overlay');
    if (oldOverlay) oldOverlay.remove();
    mediaLayer.querySelectorAll('.created-slide-content').forEach(e => e.remove());
    document.querySelectorAll('.theme-box-el').forEach(e => e.remove());
    mediaLayer.style.background = '#000';
    mediaLayer.style.backgroundImage = 'none';
    mediaLayer.classList.remove('active');
    stage.style.display = 'none';
    stage.classList.remove('out');
  }

  function updatePartBadge() {
    if (!partBadge) return;
    partBadge.style.display = 'none';
    partBadge.textContent = '';
  }

  function getBoxContent(box, data) {
    const role   = (box.role || '').toLowerCase();
    const isSong = Array.isArray(data.lines);

    if (role === 'main') {
      if (isSong) return (data.lines || []).join('\n');
      if (data.scriptureShowRefOnly) return '';
      const showNums = (data.showVerseNumbers !== false) && (data.themeData?.showVerseNum !== false);
      const breakOnNew = !!data.scriptureBreakOnNewVerse;
      if (data.rangeVerses && data.rangeVerses.length > 0) {
        const sep = breakOnNew ? '\n' : '  ';
        return data.rangeVerses.map(v => {
          const num = showNums ? v.verse + ' ' : '';
          return num + v.text;
        }).join(sep);
      }
      let text = data.text || box.text || '';
      if (showNums && data.verse) text = data.verse + ' ' + text;
      return text;
    }
    if (role === 'ref') {
      if (isSong) {
        if (!data.showSongMetadata) return '';
        return data.title ? `${data.title}${data.sectionLabel ? ' · ' + data.sectionLabel : ''}` : (box.text || '');
      }
      if (data.scriptureShowReference === false) return '';
      const dRef = data.scriptureAbbreviateBooks ? _abbreviateRef(data.ref) : data.ref;
      return dRef ? `${dRef}${data.translation ? ' · ' + data.translation : ''}` : (box.text || '');
    }
    if (role === 'title') {
      if (isSong && !data.showSongMetadata) return '';
      return data.title || data.name || box.text || '';
    }
    if (role === 'subtitle') {
      if (isSong && !data.showSongMetadata) return '';
      return data.sectionLabel || data.subtitle || box.text || '';
    }
    return box.text || '';
  }

  function _projRefOutlineCss(data) {
    const st = data.scriptureRefOutlineStyle || 'none';
    if (st === 'none') return '';
    const w = data.scriptureRefOutlineWidth ?? 0;
    if (w <= 0) return '';
    const c = data.scriptureRefOutlineColor || '#000';
    const o = (data.scriptureRefOutlineOpacity ?? 100) / 100;
    const r = parseInt(c.slice(1,3),16)||0, g = parseInt(c.slice(3,5),16)||0, b = parseInt(c.slice(5,7),16)||0;
    return `-webkit-text-stroke:${w}px rgba(${r},${g},${b},${o});paint-order:stroke fill;`;
  }

  function getBoxContentHTML(box, data) {
    const role = (box.role || '').toLowerCase();
    const isSong = Array.isArray(data.lines);
    if (role !== 'main' || isSong) return null;
    if (data.scriptureShowRefOnly) return '';
    const showNums = (data.showVerseNumbers !== false) && (data.themeData?.showVerseNum !== false);
    const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const safeNum = n => String(parseInt(n, 10) || 0);
    const breakOnNew = !!data.scriptureBreakOnNewVerse;
    const refBox = (data.themeData?.boxes || []).find(b => (b.role||'').toLowerCase() === 'ref');
    const numColor = box.refColor || refBox?.color || data.themeData?.refColor || data.themeData?.accentColor || '#c9a84c';
    const _roc = _projRefOutlineCss(data);
    const refPos = data.scriptureRefPosition || 'top';

    // ── Ref font settings (shared between ref label AND verse number) ──────────
    const _rf = data.scriptureRefFont || {};
    const rFC  = _rf.fontColor  || numColor;
    const _rfBold = _rf.fontStyle === 'bold' || _rf.fontStyle === 'bold-italic';
    const rFW  = _rfBold ? 700 : 500;
    const rfFF = _rf.fontFamily || '';
    const rfLSem = _rf.letterSpacing ?? 0;
    const rfUpper = _rf.uppercase !== false ? 'uppercase' : 'none';
    const _rfOutCss = _projRefOutlineCss(data);
    // Verse number shares: color, outline, font-family, weight, letter-spacing, transform
    const _vnStyle = `color:${rFC};font-weight:${rFW};${rfFF?`font-family:'${rfFF}',serif;`:''}letter-spacing:${rfLSem}em;text-transform:${rfUpper};${_rfOutCss}`;

    let inlineRefHTML = '';
    if (!refBox && data.scriptureShowReference !== false) {
      let dRef = data.scriptureAbbreviateBooks ? _abbreviateRef(data.ref) : data.ref;
      if (dRef) {
        const refLabel = dRef + (data.translation ? ' (' + data.translation + ')' : '');
        const rFF2 = _rf.fontFamily || 'Cinzel';
        const rFS = _rf.fontSize || 38;
        const rfOpacity = (_rf.fontOpacity ?? 90) / 100;
        const rfAlign   = _rf.textAlign || box.align || 'center';
        const refMargin = refPos === 'bottom' ? 'margin-top:0.6vw;margin-bottom:0' : 'margin-bottom:0.6vw';
        inlineRefHTML = `<div style="font-family:'${rFF2}',serif;font-size:${(rFS/19.2).toFixed(4)}vw;color:${rFC};font-weight:${rFW};opacity:${rfOpacity};letter-spacing:${rfLSem}em;text-transform:${rfUpper};${refMargin};text-align:${rfAlign};flex-shrink:0;${_rfOutCss}">${esc(refLabel)}</div>`;
      }
    }

    let verseHTML = null;
    if (data.rangeVerses && data.rangeVerses.length > 0) {
      const sep = breakOnNew ? '<br>' : '  ';
      if (showNums) {
        verseHTML = data.rangeVerses.map(v =>
          `<span class="verse-num" style="${_vnStyle}">${safeNum(v.verse)}</span>${esc(v.text)}`
        ).join(sep);
      } else if (inlineRefHTML) {
        verseHTML = data.rangeVerses.map(v => esc(v.text)).join(sep);
      }

      mediaLayer.style.backgroundImage = s.bgImage

      mediaLayer.style.backgroundSize     = 'cover';
      mediaLayer.style.backgroundPosition = 'center';
      mediaLayer.style.display     = 'block';

      const PW = 1920, PH = 1080;
      const W  = mediaLayer.offsetWidth  || window.innerWidth;

        left:${(W - PW*sc)/2}px; top:${(H - PH*sc)/2}px;

            : obj.textAlign === 'right' ? 'flex-end' : 'center';

          t.style.cssText = `
            font-family:'${obj.font||'Cinzel'}',serif;
            font-size:${(obj.fontSize||48)*sc}px;

            text-shadow:${obj.shadow===false ? 'none' : `${Number(obj.shadowOffsetX||0)*sc}px ${Number(obj.shadowOffsetY||2)*sc}px ${Math.max(0, Number(obj.shadowBlur ?? 8))*sc}px ${obj.shadowColor || '#000000'}`};
            letter-spacing:${Number(obj.letterSpacing||0)*sc}px;

        } else if (obj.type === 'shape') {
          const opacity  = (obj.shapeOpacity ?? 80) / 100;
          const radius   = obj.shape === 'ellipse' ? '50%' : ((obj.shapeRadius||0) + '%');
          const bw       = (obj.shapeBorderW||0) * sc;

        } else if (obj.type === 'line') {
          const bw = Math.max(1, (obj.shapeBorderW||2) * sc);

          const stroke  = (obj.shapeBorderW||0) > 0 ? (obj.shapeBorder||'#fff') : 'none';
          const strokeW = (obj.shapeBorderW||0) * sc;
          const sw = obj.w * sc, sh = obj.h * sc;
          const cx = sw/2, cy = sh/2;
          let pathD = '';
          if (obj.shape === 'star') {
            const or=Math.min(sw,sh)/2, ir=or*0.42; let d='';
            for(let p=0;p<10;p++){const r=p%2===0?or:ir;const a=(p*Math.PI/5)-Math.PI/2;d+=(p===0?'M':'L')+(cx+r*Math.cos(a)).toFixed(2)+','+(cy+r*Math.sin(a)).toFixed(2);} pathD=d+'Z';
          } else if (obj.shape==='triangle') { pathD=`M${cx},0 L${sw},${sh} L0,${sh} Z`; }
          else if (obj.shape==='diamond')    { pathD=`M${cx},0 L${sw},${cy} L${cx},${sh} L0,${cy} Z`; }
          else if (obj.shape==='cross')      { const t=sw*.3,u=sh*.3; pathD=`M${(sw-t)/2},0 L${(sw+t)/2},0 L${(sw+t)/2},${(sh-u)/2} L${sw},${(sh-u)/2} L${sw},${(sh+u)/2} L${(sw+t)/2},${(sh+u)/2} L${(sw+t)/2},${sh} L${(sw-t)/2},${sh} L${(sw-t)/2},${(sh+u)/2} L0,${(sh+u)/2} L0,${(sh-u)/2} L${(sw-t)/2},${(sh-u)/2} Z`; }
          else if (obj.shape==='arrow')      { const aw=sw*.4,ah=sh*.5; pathD=`M0,${(sh-ah)/2} L${sw-aw},${(sh-ah)/2} L${sw-aw},0 L${sw},${cy} L${sw-aw},${sh} L${sw-aw},${(sh+ah)/2} L0,${(sh+ah)/2} Z`; }
          else if (obj.shape==='hexagon')    { const r=Math.min(sw,sh)/2; let d=''; for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;d+=(i===0?'M':'L')+(cx+r*Math.cos(a)).toFixed(2)+','+(cy+r*Math.sin(a)).toFixed(2);} pathD=d+'Z'; }
          else if (obj.shape==='heart')      { pathD=`M${cx},${sh*.3} C${cx},${sh*.1} 0,${sh*.1} 0,${sh*.4} C0,${sh*.7} ${cx},${sh*.9} ${cx},${sh} C${cx},${sh*.9} ${sw},${sh*.7} ${sw},${sh*.4} C${sw},${sh*.1} ${cx},${sh*.1} ${cx},${sh*.3}`; }
          else if (obj.shape==='octagon')    { const r=Math.min(sw,sh)/2; let d=''; for(let i=0;i<8;i++){const a=i*Math.PI/4-Math.PI/8;d+=(i===0?'M':'L')+(cx+r*Math.cos(a)).toFixed(2)+','+(cy+r*Math.sin(a)).toFixed(2);} pathD=d+'Z'; }
          else if (obj.shape==='rhombus')    { pathD=`M${cx},0 L${sw},${cy} L${cx},${sh} L0,${cy} Z`; }
          else if (obj.shape==='speech')     { pathD=`M0,0 L${sw},0 L${sw},${sh*.7} L${sw*.4},${sh*.7} L${sw*.25},${sh} L${sw*.2},${sh*.7} L0,${sh*.7} Z`; }
          else if (obj.shape==='cloud')      { pathD=`M${sw*.25},${sh*.8} Q${sw*.05},${sh*.8} ${sw*.05},${sh*.55} Q${sw*.05},${sh*.3} ${sw*.25},${sh*.3} Q${sw*.3},${sh*.05} ${sw*.55},${sh*.1} Q${sw*.75},${sh*.05} ${sw*.8},${sh*.3} Q${sw},${sh*.3} ${sw*.95},${sh*.55} Q${sw*.95},${sh*.8} ${sw*.75},${sh*.8} Z`; }
          else if (obj.shape==='banner')     { pathD=`M0,${sh*.2} Q${sw*.05},0 ${sw*.1},${sh*.2} L${sw*.9},${sh*.2} Q${sw*.95},0 ${sw},${sh*.2} L${sw},${sh*.8} Q${sw*.95},${sh} ${sw*.9},${sh*.8} L${sw*.1},${sh*.8} Q${sw*.05},${sh} 0,${sh*.8} Z`; }
          else { pathD=`M0,0 L${sw},0 L${sw},${sh} L0,${sh} Z`; }

          el.innerHTML = `<svg width="${sw}" height="${sh}" viewBox="0 0 ${sw} ${sh}" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;overflow:visible"><path d="${pathD}" fill="${fill}" stroke="${stroke}" stroke-width="${strokeW}"/></svg>`;

        } else if (obj.type === 'image') {
          const img = document.createElement('img');
          img.src = toFileUrl(obj.src || '');
          img.style.cssText = `width:100%;height:100%;
            object-fit:${obj.imgFit||'contain'};
            opacity:${(obj.imgOpacity??100)/100};display:block;`;
          el.appendChild(img);
        }
        container.appendChild(el);
      });

      mediaLayer.appendChild(container);
      empty.style.display = 'none';
    });
  }

  function toFileUrl(p) {
    if (!p) return '';
    if (p.startsWith('http') || p.startsWith('file://') || p.startsWith('media://')) return p;
    return 'file:///' + p.replace(/\\/g, '/');
  }

  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1,3),16)||0;
    const g = parseInt(hex.slice(3,5),16)||0;
    const b = parseInt(hex.slice(5,7),16)||0;
    return `rgba(${r},${g},${b},${alpha})`;
  }

  // ── showPresentationSlide ─────────────────────────────────────────────────────
  function showPresentationSlide(data) {
    fadeTransition(() => {
      // Hide verse/song stage
      stage.classList.add('out');
      stage.style.display = 'none';

      clearProjectionMediaState();

      const fileUrl = toProjectionMediaUrl(data.imagePath || '');

      // Show the slide image using the media layer
      mediaImg.src           = fileUrl;
      mediaImg.style.display = 'block';
      mediaImg.style.objectFit = 'contain'; // keep slide aspect ratio
      mediaLayer.style.background = '#000'; // black bars instead of cut
      mediaLayer.classList.add('active');

      empty.style.display = 'none';

      // Keep caption visible if present
      // (timer stays as-is)
    });
  }

  // ── showMedia ────────────────────────────────────────────────────────────────
  function showMedia(data) {
  currentOverlayPreserveMedia = false;
    fadeTransition(() => {
      // Hide verse stage
      stage.classList.add('out');
      stage.style.display = 'none';

      clearProjectionMediaState();

      const mediaPath = getMediaPath(data);
      if (!mediaPath) {
        console.warn('Projection media render skipped: missing media path', data);
        empty.style.display = 'flex';
        return;
      }
      const fileUrl = toProjectionMediaUrl(mediaPath);

      if (data.type === 'audio') {
        // Audio-only: show full-screen music note + song name, play audio
        const overlay = document.createElement('div');
        overlay.className = 'audio-overlay';
        overlay.style.cssText = `
          position:absolute;inset:0;display:flex;flex-direction:column;
          align-items:center;justify-content:center;gap:20px;
          background:radial-gradient(ellipse at 50% 50%,#1a0a2e 0%,#000 100%);
        `;
        overlay.innerHTML = `
          <div style="font-size:80px;opacity:.8">🎵</div>
          <div style="font-family:'Cinzel',serif;font-size:clamp(18px,3vw,42px);
            color:#ede6d8;text-align:center;padding:0 60px;line-height:1.4">
            ${escapeHtml(data.name || '')}
          </div>`;
        const aud = document.createElement('audio');
        aud.loop  = data.loop !== false;
        aud.muted = false; // audio is the point — never mute
        aud.volume = Math.max(0, Math.min(1, (data.volume ?? 100) / 100));
        aud.src   = fileUrl;
        aud.load();
        aud.play().catch(()=>{});
        overlay.appendChild(aud);
        mediaLayer.appendChild(overlay);

      } else if (data.type === 'video') {
        mediaVideo.src   = fileUrl;
        mediaVideo.loop  = data.loop !== false;
        mediaVideo.dataset.wantMuted = String(!!data.mute);
        mediaVideo.dataset.wantVolume = String(Math.max(0, Math.min(1, Number.isFinite(Number(data.volume)) ? Number(data.volume) : 1)));
        mediaVideo.style.objectFit = resolveObjectFit(data);
        mediaVideo.style.display = 'block';
        mediaVideo.load();
        playProjectionVideo(mediaVideo);

      } else {
        mediaImg.src           = fileUrl;
        mediaImg.style.objectFit = resolveObjectFit(data);
        mediaImg.style.display = 'block';
      }

      mediaLayer.classList.add('active');
      empty.style.display = 'none';

      // Caption
      if (data.caption) {
        captionText.textContent = data.caption;
        captionLayer.classList.add('active');
      } else {
        captionLayer.classList.remove('active');
      }
    });
  }

  // Simple HTML-escape for projection use
  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── clearVerse (also clears media + audio) ───────────────────────────────────
  function clearVerse() {
    // FLICKER FIX B: if the projection screen is already blank (stage not
    // visible and empty placeholder is shown), skip the fade transition entirely.
    // The old code always ran fadeTransition() which flashed a black overlay
    // even when there was nothing on screen — causing the visible flicker when
    // the operator clicked Clear with nothing projected.
    const alreadyBlank = (stage.style.display === 'none' || !stage.style.display)
                      && empty.style.display !== 'none';
    if (alreadyBlank) {
      // Still clean up any stale media/audio state silently
      clearProjectionTextState();
      clearProjectionMediaState();
      captionLayer.classList.remove('active');
      return;
    }

    fadeTransition(() => {
      stage.classList.add('out');
      setTimeout(() => { stage.style.display = 'none'; stage.classList.remove('out'); }, 200);
      document.querySelectorAll('.theme-box-el').forEach(e => e.remove());
      clearProjectionTextState();
      clearProjectionMediaState();
      captionLayer.classList.remove('active');
      empty.style.display = 'flex';
    });
  }

  // ── Timer engine ─────────────────────────────────────────────────────────────
  let timerInterval = null;
  let timerEndTime  = null;
  let timerMode     = 'countdown'; // 'countdown' | 'countup'
  let timerOriginalSecs = 0;
  let timerWarnSecs = 60;
  let _blinkSpeed   = 1.0;   // seconds — decreases on each spacebar press
  let _timerEnded   = false; // true when countdown hits zero
  let _lastTimerPaint = 0;

  // Flash speed controlled via timer-flash-speed IPC from timer control window

  function applyTimerPosition(pos) {
    timerLayer.classList.remove('pos-center', 'pos-top', 'pos-edge');
    const p = (pos === 'center' || pos === 'edge') ? pos : 'top';
    timerLayer.classList.add('pos-' + p);
  }

  function applyTimerScale(scale, position) {
    const raw = Number(scale);
    const s = Number.isFinite(raw) ? Math.max(0.4, Math.min(2.0, raw)) : 1;
    const isEdge = timerLayer.classList.contains('pos-edge');
    if (!isEdge) {
      timerDisp.style.fontSize = `clamp(${Math.round(48*s)}px, ${(8*s).toFixed(1)}vw, ${Math.round(120*s)}px)`;
      timerLabel.style.fontSize = `clamp(${Math.round(12*s)}px, ${(1.6*s).toFixed(1)}vw, ${Math.round(22*s)}px)`;
    } else {
      timerDisp.style.fontSize = `clamp(${Math.round(28*s)}px, ${(4*s).toFixed(1)}vw, ${Math.round(64*s)}px)`;
      timerLabel.style.fontSize = `clamp(${Math.round(9*s)}px, ${(1*s).toFixed(1)}vw, ${Math.round(14*s)}px)`;
    }
    if (position) applyTimerPosition(position);
  }

  function startTimer(data) {
    stopTimer();
    _blinkSpeed  = 1.0;
    _timerEnded  = false;
    document.documentElement.style.setProperty('--blink-speed', '1s');
    timerMode    = data.mode || 'countdown';
    timerOriginalSecs = data.seconds || 0;
    timerWarnSecs = timerOriginalSecs <= 300 ? 60 : Math.ceil(timerOriginalSecs * 0.1);
    const clientNow = Date.now();
    const serverNow = Number(data.serverNow || clientNow);
    const skewMs = clientNow - serverNow;
    const startedAt = Number(data.startedAt || 0);
    timerEndTime = 0;
    if (startedAt > 0) {
      if (data.mode === 'countdown') {
        timerEndTime = startedAt + (timerOriginalSecs * 1000) + skewMs;
      } else {
        timerEndTime = startedAt + skewMs;
      }
    } else {
      timerEndTime = data.mode === 'countdown'
        ? clientNow + timerOriginalSecs * 1000
        : clientNow;
    }
    timerLabel.textContent = data.label || (timerMode === 'countdown' ? 'COUNTDOWN' : 'ELAPSED');
    if (data.position) applyTimerPosition(data.position);
    if (data.scale != null) applyTimerScale(data.scale);
    // Apply custom font/color for timer number
    // Store as data attribute so updateTimer can restore it after warning clears
    timerDisp.dataset.userColor = data.timerColor || '';
    if (data.timerColor) timerDisp.style.color = data.timerColor;
    else timerDisp.style.color = '';
    if (data.timerFont) timerDisp.style.fontFamily = "'" + data.timerFont + "', serif";
    else timerDisp.style.fontFamily = '';
    // Apply custom font/color for title/label
    if (data.labelColor) timerLabel.style.color = data.labelColor;
    else timerLabel.style.color = '';
    if (data.labelFont) timerLabel.style.fontFamily = "'" + data.labelFont + "', serif";
    else timerLabel.style.fontFamily = '';
    timerLayer.classList.add('active');
    updateTimer();
    timerInterval = setInterval(updateTimer, 100);
  }

  function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
    timerLayer.classList.remove('active');
    timerDisp.classList.remove('warning', 'overtime');
    // Restore normal color when stopped
    timerDisp.style.color = timerDisp.dataset.userColor || '';
  }

  function updateTimer() {
    const paintNow = performance.now();
    if (paintNow - _lastTimerPaint < 80) return;
    _lastTimerPaint = paintNow;

    const now     = Date.now();
    let   elapsed = 0;

    if (timerMode === 'countdown') {
      elapsed = Math.max(0, timerEndTime - now);
      const secs = Math.max(0, Math.floor(elapsed / 1000));
      timerDisp.textContent = formatTime(secs);
      const isWarning  = secs <= timerWarnSecs && secs > 0;
      const isOvertime = secs === 0;
      timerDisp.classList.toggle('warning',  isWarning);
      timerDisp.classList.toggle('overtime', isOvertime);
      if (isWarning || isOvertime) {
        timerDisp.style.color = '#e74c3c';
      } else {
        timerDisp.style.color = timerDisp.dataset.userColor || '';
      }
      if (isOvertime && !_timerEnded) {
        _timerEnded = true;
        timerLabel.textContent = 'Thank you. Kindly conclude your session.';
      }
    } else {
      elapsed = Math.max(0, now - timerEndTime);
      timerDisp.textContent = formatTime(Math.floor(elapsed / 1000));
    }
  }

  // ── Clock / Date display ────────────────────────────────────────────────────
  let _clockInterval = null;
  let _clockVisible  = false;
  let _clockShowDate = true;
  let _clockFormat   = '12h'; // '12h' | '24h'
  let _clockPos      = 'top-right';

  const clockLayer = document.getElementById('clockLayer');
  const clockTimeEl = document.getElementById('clockTime');
  const clockDateEl = document.getElementById('clockDate');

  function _tickClock() {
    const now = new Date();
    // Time
    if (_clockFormat === '24h') {
      const h = String(now.getHours()).padStart(2,'0');
      const m = String(now.getMinutes()).padStart(2,'0');
      clockTimeEl.textContent = `${h}:${m}`;
    } else {
      let h = now.getHours();
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      const m = String(now.getMinutes()).padStart(2,'0');
      clockTimeEl.textContent = `${h}:${m} ${ampm}`;
    }
    // Date
    if (_clockShowDate) {
      clockDateEl.style.display = '';
      const opts = { weekday:'long', month:'long', day:'numeric' };
      clockDateEl.textContent = now.toLocaleDateString('en-US', opts);
    } else {
      clockDateEl.style.display = 'none';
    }
  }

  function showClock(data) {
    _clockVisible  = true;
    _clockFormat   = data?.format   || '12h';
    _clockShowDate = data?.showDate !== false;
    _clockPos      = data?.position || 'top-right';
    // Apply position
    clockLayer.className = 'clock-layer active pos-' + _clockPos;
    // Apply custom color if provided
    if (data?.color) { clockTimeEl.style.color = data.color; clockDateEl.style.color = data.color; }
    // Apply custom font if provided
    if (data?.font)  { clockLayer.style.fontFamily = "'" + data.font + "', serif"; }
    if (!_clockInterval) _clockInterval = setInterval(_tickClock, 1000);
    _tickClock();
  }

  function hideClock() {
    _clockVisible = false;
    clockLayer.classList.remove('active');
    if (_clockInterval) { clearInterval(_clockInterval); _clockInterval = null; }
  }

  function formatTime(totalSecs) {
    const h = Math.floor(totalSecs / 3600);
    const m = Math.floor((totalSecs % 3600) / 60);
    const s = totalSecs % 60;
    if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }


  // ── Central projection render engine ────────────────────────────────────────
  let lastRenderState = { module: 'clear', payload: null, backgroundMedia: null, overlayOptions: {} };
  function normalizeRenderState(state) {
    if (!state || typeof state !== 'object') return { module: 'clear', payload: null, backgroundMedia: null, overlayOptions: {} };
    const overlayOptions = state.overlayOptions || {};
    const explicitBg = state.backgroundMedia || null;
    const explicitBgValid = !!getMediaPath(explicitBg);
    const effectiveBg = explicitBgValid ? explicitBg : ((overlayOptions.enabled || overlayOptions.preserveMedia) ? lastProjectedBackgroundMedia : null);
    return {
      module: state.module || 'clear',
      payload: state.payload ?? null,
      updatedAt: state.updatedAt || Date.now(),
      backgroundMedia: effectiveBg,
      overlayOptions,
    };
  }
  function handleAlert(data) {
    if (!data) return;
    const type = data.type;
    if (type === 'nursery') {
      if (!data.text) {
        nurseryAlertLayer.classList.remove('active');
        return;
      }
      nurseryAlertLayer.className = 'nursery-alert-layer pos-' + (data.position || 'bottom-left');
      const hex = data.bgColor || '#cc0000';
      const op = (data.bgOpacity ?? 100) / 100;
      const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      nurseryAlertLayer.style.background = `rgba(${r},${g},${b},${op})`;
      nurseryAlertText.style.fontFamily = `'${data.fontFamily || 'Tahoma'}', sans-serif`;
      nurseryAlertText.style.fontSize = `clamp(18px, ${(data.fontSize || 48) / 19.2}vw, ${(data.fontSize || 48) * 1.2}px)`;
      nurseryAlertText.style.color = data.fontColor || '#ffffff';
      nurseryAlertText.textContent = data.text;
      nurseryAlertLayer.classList.add('active');
    } else if (type === 'message') {
      if (!data.text) {
        messageAlertLayer.classList.remove('active');
        messageAlertText.style.animation = 'none';
        return;
      }
      messageAlertLayer.className = 'message-alert-layer pos-' + (data.position || 'top');
      const hex = data.bgColor || '#000000';
      const op = (data.bgOpacity ?? 100) / 100;
      const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      messageAlertLayer.style.background = `rgba(${r},${g},${b},${op})`;
      messageAlertText.style.fontFamily = `'${data.fontFamily || 'Calibri'}', sans-serif`;
      messageAlertText.style.fontSize = `clamp(18px, ${(data.fontSize || 48) / 19.2}vw, ${(data.fontSize || 48) * 1.2}px)`;
      messageAlertText.style.color = data.fontColor || '#f5deb3';
      messageAlertText.textContent = data.text;
      const speed = Math.max(1, 11 - (data.scrollSpeed || 5));
      const repeats = data.repeatCount || 2;
      const dur = speed * 3;
      messageAlertText.style.animation = 'none';
      void messageAlertText.offsetWidth;
      messageAlertText.style.animation = `alertScroll ${dur}s linear ${repeats}`;
      messageAlertLayer.classList.add('active');
      messageAlertText.addEventListener('animationend', () => {
        messageAlertLayer.classList.remove('active');
      }, { once: true });
    }
  }

  // ── Logo Overlay (draggable/resizable watermark) ─────────────────────────
  let _logoOverlayState = { visible: false, src: null, type: 'image', xPct: 95, yPct: 95, sizePct: 20, opacity: 1, position: 'bottom-right', draggable: false };

  function handleLogoOverlay(data) {
    if (!data) { logoOverlayLayer.classList.remove('active'); return; }
    Object.assign(_logoOverlayState, data);
    if (!_logoOverlayState.visible || !_logoOverlayState.src) {
      logoOverlayLayer.classList.remove('active', 'draggable');
      return;
    }
    const existing = logoOverlayLayer.querySelector('img, video');
    const srcMatch = existing && existing.getAttribute('data-logo-src') === _logoOverlayState.src;
    if (!srcMatch) {
      const old = logoOverlayLayer.querySelector('img, video');
      if (old) { if (old.pause) old.pause(); old.remove(); }
      let el;
      if (_logoOverlayState.type === 'video') {
        el = document.createElement('video');
        el.autoplay = true; el.loop = true; el.muted = true;
        el.setAttribute('playsinline', '');
        el.src = _logoOverlayState.src;
        el.load();
        el.play().catch(() => {});
      } else {
        el = document.createElement('img');
        el.src = _logoOverlayState.src;
      }
      el.setAttribute('data-logo-src', _logoOverlayState.src);
      logoOverlayLayer.insertBefore(el, logoResizeHandle);
    }
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const size = Math.round(vw * _logoOverlayState.sizePct / 100);
    logoOverlayLayer.style.width = size + 'px';
    logoOverlayLayer.style.height = size + 'px';
    logoOverlayLayer.style.opacity = _logoOverlayState.opacity;
    const anchorX = vw * _logoOverlayState.xPct / 100;
    const anchorY = vh * _logoOverlayState.yPct / 100;
    let left, top;
    const pos = _logoOverlayState.position;
    if (pos === 'top-left') { left = anchorX; top = anchorY; }
    else if (pos === 'top-right') { left = anchorX - size; top = anchorY; }
    else if (pos === 'bottom-left') { left = anchorX; top = anchorY - size; }
    else if (pos === 'bottom-right') { left = anchorX - size; top = anchorY - size; }
    else if (pos === 'center') { left = anchorX - size / 2; top = anchorY - size / 2; }
    else { left = anchorX - size / 2; top = anchorY - size / 2; }
    logoOverlayLayer.style.left = Math.max(0, Math.min(vw - size, left)) + 'px';
    logoOverlayLayer.style.top = Math.max(0, Math.min(vh - size, top)) + 'px';
    logoOverlayLayer.classList.add('active');
  }

  window.addEventListener('resize', () => {
    if (_logoOverlayState.visible) handleLogoOverlay(_logoOverlayState);
  });

  function dispatchRenderState(rawState) {
    const state = normalizeRenderState(rawState);
    if (state.module === 'logo-overlay') {
      handleLogoOverlay(state.payload || {});
      return;
    }
    lastRenderState = state;
    switch (state.module) {
      case 'scripture':
      case 'verse':
        showVerse(state.payload || {}, { preserveMedia: !!state.backgroundMedia, backgroundMedia: state.backgroundMedia || null, overlayOptions: state.overlayOptions || {} });
        break;
      case 'song':
        showSong(state.payload || {}, { preserveMedia: !!state.backgroundMedia, backgroundMedia: state.backgroundMedia || null, overlayOptions: state.overlayOptions || {} });
        break;
      case 'media':
        lastProjectedBackgroundMedia = state.payload || null;
        showMedia(state.payload || {});
        break;
      case 'presentation-slide':
        showPresentationSlide(state.payload || {});
        break;
      case 'created-slide':
        showCreatedSlide(state.payload || {});
        break;
      case 'timer':
        startTimer(state.payload || {});
        return;
      case 'timer-scale': {
        const tp = state.payload || {};
        if (tp.position) applyTimerPosition(tp.position);
        applyTimerScale(tp.scale);
        return;
      }
      case 'alert':
        handleAlert(state.payload || {});
        return;
      case 'clear':
      default:
        clearVerse();
        break;
    }
  }

  // ── Receive from main process ────────────────────────────────────────────────
  if (window.electronAPI) {
    window.electronAPI.on('show-verse',  showVerse);
    window.electronAPI.on('show-song',   showSong);
    window.electronAPI.on('show-media',  showMedia);
    window.electronAPI.on('show-presentation-slide', showPresentationSlide);
    window.electronAPI.on('show-created-slide',      showCreatedSlide);
    window.electronAPI.on('render-state', dispatchRenderState);
    window.electronAPI.on('clear-verse', clearVerse);
    window.electronAPI.on('show-clock',  showClock);
    window.electronAPI.on('hide-clock',  hideClock);
    window.electronAPI.on('show-timer',  startTimer);
    // Sync clock state when projection window reopens
    window.electronAPI.getClockState?.().then(data => {
      if (data) showClock(data);
    }).catch(() => {});
    window.electronAPI.on('stop-timer',  stopTimer);
    // Flash speed control from timer window Flash Faster button
    window.electronAPI.on('timer-flash-speed', (data) => {
      // Fixed speeds: 0.25s when button held, 1s when released
      const speed = data?.speed ?? 1;
      document.documentElement.style.setProperty('--blink-speed', speed + 's');
    });
    // Projection background control (standalone timer / greyed-out in main app)
    window.electronAPI.on('set-projection-bg', (data) => {
      const bg = document.querySelector('.bg');
      const mediaLayer = document.getElementById('mediaLayer');
      const mediaImg   = document.getElementById('mediaImg');
      const mediaVideo = document.getElementById('mediaVideo');
      if (!data || data.type === 'default') {
        // Restore default dark gradient
        document.body.style.background = '';
        if (bg) { bg.style.background = ''; bg.className = 'bg'; }
        if (mediaImg)   { mediaImg.style.display = 'none'; mediaImg.src = ''; }
        if (mediaVideo) { mediaVideo.style.display = 'none'; mediaVideo.src = ''; mediaVideo.pause(); }
        if (mediaLayer) { mediaLayer.style.background = ''; mediaLayer.classList.remove('active'); }
        return;
      }
      if (data.type === 'solid') {
        if (bg) { bg.style.background = data.color || '#000000'; bg.className = 'bg'; }
        document.body.style.background = data.color || '#000000';
        if (mediaImg)   { mediaImg.style.display = 'none'; mediaImg.src = ''; }
        if (mediaVideo) { mediaVideo.style.display = 'none'; mediaVideo.src = ''; mediaVideo.pause(); }
        if (mediaLayer) mediaLayer.classList.remove('active');
      } else if (data.type === 'image') {
        if (bg) { bg.style.background = '#000'; }
        if (mediaImg) {
          mediaImg.src = data.path.startsWith('file://') ? data.path : 'file://' + data.path;
          mediaImg.style.cssText = 'display:block;position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1';
        }
        if (mediaVideo) { mediaVideo.style.display = 'none'; mediaVideo.src = ''; mediaVideo.pause(); }
        if (mediaLayer) mediaLayer.classList.add('active');
      } else if (data.type === 'video') {
        if (bg) { bg.style.background = '#000'; }
        if (mediaVideo) {
          mediaVideo.src = data.path.startsWith('file://') ? data.path : 'file://' + data.path;
          mediaVideo.style.cssText = 'display:block;position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1';
          mediaVideo.loop = true;
          mediaVideo.muted = true;
          mediaVideo.play().catch(()=>{});
        }
        if (mediaImg) { mediaImg.style.display = 'none'; mediaImg.src = ''; }
        if (mediaLayer) mediaLayer.classList.add('active');
      }
    });
    window.electronAPI.on('timer-scale', (d) => { if (d?.position) applyTimerPosition(d.position); applyTimerScale(d?.scale); });
    window.electronAPI.on('show-caption', (data) => {
      captionText.textContent = data.text || '';
      captionLayer.classList.toggle('active', !!data.text);
    });
    window.electronAPI.on('show-alert', handleAlert);
    window.electronAPI.on('logo-overlay', handleLogoOverlay);
    window.electronAPI.getCurrentRenderState?.().then(dispatchRenderState).catch(() => {});

    // Sync timer state when projection window opens or reopens.
    // This handles the case where a timer was already running when the
    // projection window was closed and then reopened.
    window.electronAPI.getTimerState?.().then(state => {
      if (state?.running) {
        startTimer({
          ...(state.data || {}),
          seconds:  Math.ceil(state.seconds || 0),
          startedAt: state.startedAt,
          serverNow: state.serverNow || Date.now(),
          mode:     state.mode     || 'countdown',
          label:    state.label    || '',
          scale:    state.scale    || 1,
          position: state.position || 'edge',
        });
      }
    }).catch(() => {});
  } else {
    fetch('/api/render-state').then(r => r.json()).then(state => {
      if (state && state.module) dispatchRenderState(state);
    }).catch(() => {});
    const evtSource = new EventSource('/api/events');
    evtSource.addEventListener('render-state', (e) => {
      try {
        const state = JSON.parse(e.data);
        dispatchRenderState(state);
      } catch (_) {}
    });
  }
</script>
</body>
</html>
